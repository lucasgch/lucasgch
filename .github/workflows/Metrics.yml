name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_STATS_TOKEN }}
          
          # Configurações de Identidade
          user: lucasgch
          template: classic
          base: header, activity, community, repositories, metadata
          
          # 1. Calendário de 1 ano completo (Os quadradinhos que você queria)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year 

          # 2. Linguagens (Foco em Backend)
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # 3. Linhas de código
          plugin_lines: yes
          
          # Configurações Visuais Corrigidas
          config_timezone: America/Sao_Paulo
          config_presets: dark # Em vez de 'theme', usamos presets ou templa
