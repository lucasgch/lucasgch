on:
  schedule: [{cron: "0 0 * * *"}] # Roda toda meia-noite
  workflow_dispatch: # Permite rodar manualmente nas Actions
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_STATS_TOKEN }}
          
          # Configurações de Exibição
          base: header, activity, community, repositories, metadata
          optimize: xml
          hub_user: lucasgch
          
          # 1. Aumentando o período do Calendário (ISO Calendar)
          # Opções: half-year (6 meses) ou full-year (1 ano)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year 

          # 2. Adicionando Linguagens Mais Usadas (Top Languages)
          plugin_languages: yes
          plugin_languages_ignored: html, css # Se quiser focar no Backend (Java/JS)
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # 3. Adicionando Linhas de Código (Ótimo para devs Backend)
          plugin_lines: yes
          
          # 4. Hábitos de Codificação (Mostra os horários que você mais commita)
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_days: 14
          
          # Estilo Visual (Escolha um tema: dark, gothic, midnight, etc)
          config_timezone: America/Sao_Paulo
          theme: dark
